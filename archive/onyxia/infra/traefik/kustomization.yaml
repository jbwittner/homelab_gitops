apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Ressources annexes spécifiques au cluster (rendues par la 2ᵉ source de l'Application).
# values.yaml (override Helm) et <name>.app.yaml ne sont PAS listés ici : les values sont
# consommées via valueFiles ($src), et l'Application est découverte par le bootstrap tier-2.
resources:
  - namespace.yaml
