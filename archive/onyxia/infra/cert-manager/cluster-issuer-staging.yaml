# ClusterIssuer Let's Encrypt STAGING — pour tester la chaîne d'émission (DNS-01 Cloudflare)
# sans consommer le rate limit prod. Certs signés « (STAGING) Let's Encrypt » = non trustés par
# les navigateurs. Compte ACME séparé du prod (privateKeySecretRef distinct).
# ⚠️ Non fonctionnel tant que le Secret cloudflare-api-token n'est pas scellé (cf. README).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: jeanbaptiste.wittner@outlook.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
