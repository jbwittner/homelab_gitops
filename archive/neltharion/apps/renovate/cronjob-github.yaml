apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-github
  namespace: renovate
spec:
  schedule: '@daily'               # 00h UTC
  concurrencyPolicy: Forbid        # jamais deux runs GitHub en parallèle
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              # renovate: datasource=docker depName=renovate/renovate
              image: renovate/renovate:43.234.0
              env:
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_PLATFORM
                  value: github
                # API github.com par défaut — pas de RENOVATE_ENDPOINT.
                - name: RENOVATE_REPOSITORIES
                  value: 'jbwittner/homelab_gitops'    # repos GitHub à surveiller (CSV)
                - name: RENOVATE_GIT_AUTHOR
                  value: 'Renovate Bot <bot@renovateapp.com>'
              envFrom:
                # Secret renovate-github-env (scellé) : porte RENOVATE_TOKEN (PAT GitHub).
                - secretRef:
                    name: renovate-github-env
