apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# App renovate autonome : Renovate self-hosted (CLI), un CronJob GitHub.
#   - renovate-github → platform github (repos GitHub) + Secret renovate-github-env
# cronjob-github.yaml est AUTO-CONTENU ; config 100% via variables d'environnement,
# token via envFrom sur le Secret scellé.
# Le *.secret.yaml (placeholder en clair) est gitignored — PAS une resource ici.
resources:
  - namespace.yaml
  - renovate-github-env.sealed-secret.yaml
  - cronjob-github.yaml
