---
# EXEMPLE — résultat de `kubeseal` sur secret.example.yaml : un SealedSecret.
#
# C'est CE fichier qui est committé (`<name>.sealed-secret.yaml`) et listé dans le
# `kustomization.yaml` du composant. Le contrôleur sealed-secrets le déchiffre dans le
# cluster et matérialise le Secret décrit par `spec.template`.
#
# ⚠️ Les valeurs sous `encryptedData` ci-dessous sont FACTICES (tronquées) — un vrai
# SealedSecret n'est déchiffrable que par le contrôleur du cluster qui l'a scellé
# (SealedSecrets = par-cluster, cf. neltharion/README.md).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mon-secret-env
  namespace: mon-namespace
spec:
  encryptedData:
    MON_TOKEN: AgBxEXEMPLE_FACTICE_ne_pas_utiliser_xxxxxxxxxxxxxxxxxxxxxxxxxx==
    AUTRE_VALEUR: AgCyEXEMPLE_FACTICE_ne_pas_utiliser_yyyyyyyyyyyyyyyyyyyyyyyy==
  template:
    metadata:
      name: mon-secret-env
      namespace: mon-namespace
    type: Opaque
