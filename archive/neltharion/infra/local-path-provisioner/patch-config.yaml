# Pointe le provisioner sur le disque data Talos.
# Le UserVolumeConfig `data` (homelab-talos) monte le disque dédié sur /var/mnt/data ;
# les PV atterrissent dans le sous-dossier local-path-provisioner/ (créé au 1er provisioning).
# Strategic-merge sur la clé config.json uniquement : setup/teardown/helperPod.yaml du
# ConfigMap upstream restent inchangés.
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: local-path-storage
data:
  config.json: |-
    {
            "nodePathMap":[
            {
                    "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
                    "paths":["/var/mnt/data/local-path-provisioner"]
            }
            ]
    }
