# ClusterIssuer Let's Encrypt PROD — certs trustés (DNS-01 Cloudflare). Rate limit strict :
# tester d'abord via cluster-issuer-staging.yaml. Compte ACME séparé du staging.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: jeanbaptiste.wittner@outlook.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
