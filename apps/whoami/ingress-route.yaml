apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami
  namespace: whoami
  annotations:
    external-dns.alpha.kubernetes.io/hostname: argocd.wittnerlab.com
    external-dns.alpha.kubernetes.io/target: 5.135.136.115
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoami.wittnerlab.com`)
      kind: Rule
      services:
        - name: whoami
          port: 80
  tls:
    secretName: whoami-tls
