# Override external-dns SPÉCIFIQUE à neltharion (fusionné après values-common.yaml).
#
# NB : Helm REMPLACE les listes (pas de merge). Comme --default-targets est spécifique au
# cluster, TOUT extraArgs doit vivre ici (sinon --traefik-disable-legacy serait perdu).

domainFilters:
  - wittnerlab.com

# Identifiant du cluster dans les enregistrements TXT de ownership
txtOwnerId: neltharion

# Homelab hostPort (pas de LoadBalancer) : l'IP cible du nœud est fournie une seule fois
# ici via --default-targets (source de vérité unique). Les IngressRoutes ne portent donc
# plus d'annotation external-dns.alpha.kubernetes.io/target ; elles ne déclarent que le
# hostname. Changement d'IP = éditer cette ligne seule.
extraArgs:
  - --traefik-disable-legacy
  - --default-targets=5.135.136.115
