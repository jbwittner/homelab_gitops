apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-neltharion
  namespace: argocd
  labels:
    app.kubernetes.io/name: root-neltharion
    app.kubernetes.io/part-of: homelab-gitops
    app.kubernetes.io/component: app-of-apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # App-of-apps DU cluster neltharion, appliqué sur le HUB. Découvre toutes les Applications
  # du cluster ; le glob include ne retient QUE les manifestes *.app.yaml (les values.yaml /
  # kustomization.yaml / *.sealed-secret.yaml des dossiers d'overlay sont ignorés).
  # Onboarder un cluster = 1 root-<cluster>.yaml comme celui-ci, appliqué sur le hub.
  source:
    repoURL: git@github.com:jbwittner/homelab_gitops.git
    targetRevision: main
    path: clusters/neltharion
    directory:
      recurse: true
      include: '*.app.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
