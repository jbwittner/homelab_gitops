# --- hostNetwork : Traefik écoute directement sur 80/443 du nœud ---
hostNetwork: false

deployment:
  replicas: 1

# --- rolling update adapté au hostNetwork (sinon erreur maxUnavailable) ---
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

# --- Service en ClusterIP : pas de LoadBalancer sur BM ---
service:
  type: ClusterIP

# --- ports : 80 (web) et 443 (websecure) ---
ports:
  websecure:
    port: 8443
    hostPort: 443
    exposedPort: 443
  web:
    port: 8000
    hostPort: 80
    exposedPort: 80

# --- redirect HTTP->HTTPS via additionalArguments (PAS via redirectTo) ---
# additionalArguments:
#   - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
#   - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

# --- pas d'ACME : cert-manager gère les certs ---
# (volontairement aucune section certResolver / acme)

# --- dashboard : désactivé par défaut (port-forward si besoin) ---
ingressRoute:
  dashboard:
    enabled: false

# --- CRD : selon la version du chart, voir note ci-dessous ---