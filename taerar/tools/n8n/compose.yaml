services:
  n8n-db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      TZ: Europe/Paris
    volumes:
      - n8n-db-data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  apps-db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: apps
      POSTGRES_USER: apps
      POSTGRES_PASSWORD: ${APPS_DB_PASSWORD:?APPS_DB_PASSWORD required}
      TZ: Europe/Paris
    volumes:
      - apps-db-data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apps -d apps"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.26.4
    restart: unless-stopped
    depends_on:
      n8n-db:
        condition: service_healthy
    expose:
      - 5678
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_SCHEMA: public
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}

      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_HOST: n8n.wittnerlab.com
      WEBHOOK_URL: https://n8n.wittnerlab.com/
      GENERIC_TIMEZONE: Europe/Paris
      TZ: Europe/Paris
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"

      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY required}
    volumes:
      - n8n-data:/home/node/.n8n
    user: "1000:1000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 500M

volumes:
  n8n-data:
  n8n-db-data:
  apps-db-data:
