services:
  certbot:
    image: certbot/dns-cloudflare:v5.6.0
    container_name: messaging_postfix_certbot
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        certbot certonly \
          --dns-cloudflare \
          --dns-cloudflare-credentials /cloudflare-secret/cloudflare.ini \
          --dns-cloudflare-propagation-seconds 20 \
          --email "${LETSENCRYPT_EMAIL}" \
          --agree-tos \
          --no-eff-email \
          -d "${HOSTNAME}" \
          --non-interactive \
          --keep-until-expiring \
          --server "${LETSENCRYPT_SERVER}"
        mkdir -p /opt/postfix-certs
        cp -L /etc/letsencrypt/live/${HOSTNAME}/fullchain.pem /opt/postfix-certs/fullchain.pem
        cp -L /etc/letsencrypt/live/${HOSTNAME}/privkey.pem /opt/postfix-certs/privkey.pem
        chmod 644 /opt/postfix-certs/fullchain.pem
        chmod 644 /opt/postfix-certs/privkey.pem
        echo "Certificates ready at /opt/postfix-certs"
    environment:
      - HOSTNAME=${HOSTNAME}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - LETSENCRYPT_SERVER=${LETSENCRYPT_SERVER:-https://acme-v02.api.letsencrypt.org/directory}
    volumes:
      - ../../../../files/cloudflare.ini:/cloudflare-secret/cloudflare.ini:ro
      - letsencrypt_data:/etc/letsencrypt
      - postfix_certs_data:/opt/postfix-certs

  mail_sender:
    image: boky/postfix:5.1.0
    container_name: messaging_postfix_mail_sender
    restart: unless-stopped
    # Pas de `ports:` — le relais n'est PAS exposé sur l'hôte. Les apps clientes
    # (Forgejo, ...) l'atteignent uniquement en interne via le réseau messaging_net,
    # sur messaging_postfix_mail_sender:587.
    environment:
      - HOSTNAME=${HOSTNAME}
      - ALLOWED_SENDER_DOMAINS=${ALLOWED_SENDER_DOMAINS}
      - ENABLE_OPENDKIM=true
      # Clé DKIM FIGÉE (fournie via bind-mount, cf. volumes). autogenerate=false → jamais
      # de régénération silencieuse qui désynchroniserait le TXT DNS. Voir NOTES.md "Figer la clé DKIM".
      - DKIM_AUTOGENERATE=false
      - SMTPD_SASL_USERS=${SMTP_USER}
      - POSTFIX_smtpd_tls_cert_file=/etc/postfix/certs/fullchain.pem
      - POSTFIX_smtpd_tls_key_file=/etc/postfix/certs/privkey.pem
      - POSTFIX_smtpd_tls_security_level=may
      - POSTFIX_smtpd_sender_restrictions=permit_sasl_authenticated, permit_mynetworks, reject_non_fqdn_sender, reject_unknown_sender_domain
      - POSTFIX_smtpd_relay_restrictions=permit_sasl_authenticated, permit_mynetworks, reject_unauth_destination
    volumes:
      # Clé DKIM persistée hors d'un volume Docker (bind-mount Dokploy "Files/Mounts",
      # même convention que cloudflare.ini). Contient wittnerlab.com.private + .txt.
      # RW car l'entrypoint boky doit chown/chmod les clés au démarrage.
      - ../../../../files/opendkim-keys/wittnerlab.com.txt:/etc/opendkim/keys/wittnerlab.com.txt:ro
      - postfix_certs_data:/etc/postfix/certs:ro
    networks:
      - messaging_net        # réseau partagé pour que les apps (Forgejo, ...) joignent ce relais
    depends_on:
      certbot:
        condition: service_completed_successfully

volumes:
  # dkim_data supprimé : la clé DKIM vient désormais d'un bind-mount (cf. mail_sender.volumes)
  # pour ne plus dépendre du cycle de vie d'un volume Docker.
  letsencrypt_data:
    driver: local
  postfix_certs_data:
    driver: local

networks:
  messaging_net:
    # Réseau partagé créé manuellement (cf. NOTES.md) — déclaré ici comme externe.
    external: true