apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: jeanbaptiste.wittner@outlook.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key      # créé par cert-manager (ns cert-manager)
    solvers:
      - dns01:
          cloudflare:
            # Token API Cloudflare (Zone:DNS:Edit + Zone:Zone:Read). SealedSecret dans ns cert-manager.
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
