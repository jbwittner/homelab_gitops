apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ClusterIssuer (cluster-scoped), Certificates (ns gateway), token Cloudflare (SealedSecret, ns cert-manager).
# Chaque manifeste porte son propre namespace → pas de `namespace:` global ici.
resources:
  - clusterissuer.yaml
  - certificates.yaml
  # Décommenter APRÈS avoir scellé le token (cf. README.md) — sinon build kustomize KO (fichier absent) :
  - cloudflare-api-token.sealed.yaml
