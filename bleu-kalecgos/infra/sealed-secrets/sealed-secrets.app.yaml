apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-8"       # très tôt : CRD+controller avant tout SealedSecret (ex. token Cloudflare)
  labels:
    app.kubernetes.io/name: sealed-secrets
    app.kubernetes.io/part-of: homelab-gitops
    app.kubernetes.io/component: secrets
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # Contrôleur sealed-secrets (Bitnami). Source unique = chart Helm, aucune values custom.
  # Décrypte les SealedSecret du repo → Secret K8s natifs. Clé privée reste DANS le cluster.
  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.19.1
    helm:
      releaseName: sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
