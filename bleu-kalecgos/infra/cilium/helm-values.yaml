# helm-values.yaml — source unique Cilium pour bleu-kalecgos
ipam:
  mode: kubernetes
kubeProxyReplacement: true
operator:
  replicas: 1
k8sServiceHost: localhost
k8sServicePort: 7445
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
# Features gérées ici, communes aux deux consommateurs :
l2announcements:
  enabled: true
k8sClientRateLimit:
  qps: 10
  burst: 20
# Gateway API — contrôleur Cilium (CRDs v1.4.1 posées via Application gateway-api-crds)
gatewayAPI:
  enabled: true