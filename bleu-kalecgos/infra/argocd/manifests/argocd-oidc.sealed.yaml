---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-oidc
  namespace: argocd
spec:
  encryptedData:
    client-secret: 
  template:
    metadata:
      name: argocd-oidc
      namespace: argocd
      labels:
        # OBLIGATOIRE : sans ce label, ArgoCD ignore le secret référencé par
        # $argocd-oidc:client-secret → client_secret vide → invalid_client.
        app.kubernetes.io/part-of: argocd
    type: Opaque
