apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

# Argo CD de bleu-kalecgos, dossier autonome : install upstream épinglé + patchs cmd-params/cm
# + la HTTPRoute UI (argocd.kalecgos.lan.wittner.tech, TLS terminé à la Gateway shared-gw).
# Sert AUSSI à l'apply manuel du bootstrap (kubectl apply -k ce dossier).
#
# Note compat K8s 1.36 : le tag de l'install.yaml ci-dessous est le point d'épinglage Argo.
# Si les pods crash-loop après upgrade, bumper le tag vX.Y.Z ici.
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/refs/tags/v3.4.5/manifests/install.yaml
  - argocd-httproute.yaml
  - argocd-oidc.sealed.yaml — à ajouter APRÈS scellement du client-secret (cf. README §Opérations).
  # Référencer un fichier inexistant casse `kustomize build` → app self-managed en erreur.
patches:
  - path: argocd-cmd-params-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
  - path: argocd-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
  - path: argocd-rbac-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-rbac-cm
