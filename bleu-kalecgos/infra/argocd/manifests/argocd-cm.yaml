apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # URL externe (TLS terminé au Gateway). Sans ça, argocd-server dérive le schéma
  # de la requête backend (HTTP clair, server.insecure=true) → logout/redirect en http.
  url: https://argocd.kalecgos.lan.wittner.tech
  # Enables application status badge feature
  statusbadge.enabled: "true"
  # SSO OIDC via authentik. clientSecret référence la SealedSecret argocd-oidc
  # (clé client-secret), pas argocd-secret managé par Argo. Le provider/application
  # côté authentik est géré en Terraform (autre repo) — contrat : clientID=argocd,
  # issuer + scopes ci-dessous doivent matcher.
  oidc.config: |
    name: Authentik
    issuer: https://authentik.wittner.tech/application/o/argocd/
    clientID: argocd
    clientSecret: $argocd-oidc:client-secret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
