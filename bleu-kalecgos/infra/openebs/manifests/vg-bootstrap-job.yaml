# Bootstrap du Volume Group `lvmvg` sur la partition brute `r-lvmpv`.
#
# Pourquoi un Job et pas le driver : LocalPV-LVM ne provisionne PAS le VG, il l'exige préexistant.
# Talos n'a pas de lvm2 userspace sur l'hôte → on crée PV+VG depuis un conteneur privilégié qui
# embarque lvm2 (MÊME image que le node-plugin : versions lvm2/device-mapper strictement alignées,
# cf. note quickstart « all nodes must run the same LVM2 & dm-snapshot »).
#
# Ordonnancement (sync-waves de ressource, tranchés par le runbook) :
#   namespace privileged (-1) → CE Job (0, ressource NORMALE, pas un hook) → StorageClass (1).
#   Ressource normale à la wave 0 → s'exécute forcément APRÈS le namespace labellisé (-1), donc
#   admis par PSA. Un PreSync hook, lui, tournerait AVANT la pose du label → rejet baseline (le bug).
#   ArgoCD attend que le Job soit Healthy (= Complete) avant de passer la StorageClass en wave 1.
#
# État réel sur disque, hors GitOps réconciliable (analogue à l'exception AdGuard) : le VG vit dans
# les métadonnées LVM du device, pas dans Git. Le Job est IDEMPOTENT (skip si PV/VG déjà là) → un
# re-sync ou un selfHeal ne casse rien. Spec de Job immuable → `Replace=true` pour qu'ArgoCD
# recrée le Job au lieu d'échouer à le patcher si le script change un jour.
apiVersion: batch/v1
kind: Job
metadata:
  name: lvmvg-bootstrap
  namespace: openebs
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: null   # NE PAS auto-supprimer : ArgoCD doit voir le Job Complete (sinon flap OutOfSync)
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openebs-lvm
        app.kubernetes.io/component: vg-bootstrap
    spec:
      restartPolicy: OnFailure
      # Pas de tolérations : le node-plugin (DaemonSet, tolerations vides) tourne déjà sur le
      # control-plane mono-nœud → le nœud est schedulable, le Job aussi.
      containers:
        - name: vg-bootstrap
          image: docker.io/openebs/lvm-driver:1.9.1
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export LVM_SUPPRESS_FD_WARNINGS=1

              # Partlabel Talos → device réel. pvs/vgs raisonnent sur le chemin résolu.
              DEV="$(readlink -f /dev/disk/by-partlabel/r-lvmpv)"
              VG="lvmvg"
              echo ">> Partition brute r-lvmpv résolue : ${DEV}"

              # PV : créer seulement si le device n'est pas déjà un Physical Volume.
              if pvs --noheadings -o pv_name 2>/dev/null | tr -d ' ' | grep -qx "${DEV}"; then
                echo ">> PV déjà présent sur ${DEV} — skip pvcreate"
              else
                echo ">> pvcreate ${DEV}"
                pvcreate "${DEV}"
              fi

              # VG : créer seulement s'il n'existe pas encore.
              if vgs --noheadings -o vg_name 2>/dev/null | tr -d ' ' | grep -qx "${VG}"; then
                echo ">> VG ${VG} déjà présent — skip vgcreate"
              else
                echo ">> vgcreate ${VG} ${DEV}"
                vgcreate "${VG}" "${DEV}"
              fi

              echo ">> État final :"
              vgdisplay "${VG}"
          volumeMounts:
            - name: dev
              mountPath: /dev
      volumes:
        - name: dev
          hostPath:
            path: /dev