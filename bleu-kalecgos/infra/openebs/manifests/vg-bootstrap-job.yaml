# Bootstrap du Volume Group `lvmvg` sur la partition brute `r-lvmpv`.
#
# Pourquoi un Job : LocalPV-LVM ne provisionne PAS le VG, il l'exige préexistant. Talos n'a pas de
# lvm2 userspace sur l'hôte → on crée PV+VG depuis un conteneur privilégié qui embarque lvm2 (MÊME
# image que le node-plugin : versions lvm2/device-mapper alignées).
#
# Pourquoi un HOOK `Sync` (et pas une ressource normale) : un Job a des champs immuables
# (spec.selector auto-généré, spec.template). Une ressource normale finit toujours par déclencher un
# apply/replace qui échoue sur ces champs. Un hook `Sync` avec `hook-delete-policy: BeforeHookCreation`
# est RECRÉÉ à neuf à chaque sync (jamais mis à jour) → plus de conflit d'immuabilité, et le script
# est repris automatiquement s'il change.
#
# Pourquoi `Sync` et pas `PreSync` : un PreSync tournerait AVANT la pose du label `privileged` sur le
# namespace (wave -1) → rejet PSA baseline. Un hook `Sync` est ordonné AVEC les ressources normales
# par sync-wave dans la phase Sync :
#     namespace privileged (-1) → CE hook (0) → StorageClass (1).
# ArgoCD attend que le hook soit Complete avant de passer la StorageClass en wave 1.
#
# État réel sur disque, hors GitOps (analogue AdGuard). Script IDEMPOTENT (skip si PV/VG déjà là) →
# recréation à chaque sync sans danger. `BeforeHookCreation` garde le dernier run inspectable
# (kubectl -n openebs logs job/lvmvg-bootstrap) jusqu'au sync suivant.
apiVersion: batch/v1
kind: Job
metadata:
  name: lvmvg-bootstrap
  namespace: openebs
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "0"
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openebs-lvm
        app.kubernetes.io/component: vg-bootstrap
    spec:
      restartPolicy: OnFailure
      # Pas de tolérations : le node-plugin (DaemonSet) tourne déjà sur le control-plane mono-nœud
      # → le nœud est schedulable, le Job aussi.
      containers:
        - name: vg-bootstrap
          image: docker.io/openebs/lvm-driver:1.9.1
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export LVM_SUPPRESS_FD_WARNINGS=1

              # Partlabel Talos → device réel. pvs/vgs raisonnent sur le chemin résolu.
              DEV="$(readlink -f /dev/disk/by-partlabel/r-lvmpv)"
              VG="lvmvg"
              echo ">> Partition brute r-lvmpv résolue : ${DEV}"

              # PV : créer seulement si le device n'est pas déjà un Physical Volume.
              if pvs --noheadings -o pv_name 2>/dev/null | tr -d ' ' | grep -qx "${DEV}"; then
                echo ">> PV déjà présent sur ${DEV} — skip pvcreate"
              else
                echo ">> pvcreate ${DEV}"
                pvcreate "${DEV}"
              fi

              # VG : créer seulement s'il n'existe pas encore.
              if vgs --noheadings -o vg_name 2>/dev/null | tr -d ' ' | grep -qx "${VG}"; then
                echo ">> VG ${VG} déjà présent — skip vgcreate"
              else
                echo ">> vgcreate ${VG} ${DEV}"
                vgcreate "${VG}" "${DEV}"
              fi

              echo ">> État final :"
              vgdisplay "${VG}"
          volumeMounts:
            - name: dev
              mountPath: /dev
      volumes:
        - name: dev
          hostPath:
            path: /dev