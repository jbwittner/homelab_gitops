apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik-server
spec:
  # group/kind/weight/sectionName et matches explicites : le CRD les injecte comme
  # défauts côté live — sans eux, OutOfSync permanent dans ArgoCD (cf. argocd-httproute).
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gw
      namespace: gateway
      sectionName: https-public
  hostnames:
    - authentik.wittner.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: authentik-server
          port: 80
          weight: 1
