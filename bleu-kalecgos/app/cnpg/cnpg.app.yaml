apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-app
  namespace: argocd
  # finalizer retiré temporairement — renommage d'Application en cours (prune non-cascadant)
spec:
  project: default
  sources:
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cloudnative-pg
      targetRevision: 0.29.0
      helm:
        valueFiles:
          - $values/bleu-kalecgos/app/cnpg/helm-values.yaml
    - repoURL: https://github.com/jbwittner/homelab_gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true