apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bleu-kalecgos-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # App-of-apps de la partie APP de bleu-kalecgos : découvre tous les composants infra
  # (recurse + include '*.app.yaml' → matche app/<name>/<name>.app.yaml, PAS ce fichier
  # *.bootstrap.yaml qui a un suffixe différent).
  project: default
  source:
    repoURL: https://github.com/jbwittner/homelab_gitops.git
    targetRevision: main
    path: bleu-kalecgos/app
    directory:
      recurse: true
      include: '*.app.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
