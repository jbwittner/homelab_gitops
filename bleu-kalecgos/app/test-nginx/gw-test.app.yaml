apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gw-test
  namespace: argocd
  # finalizer retiré temporairement — renommage d'Application en cours (prune non-cascadant)
spec:
  project: default
  source:
    repoURL: https://github.com/jbwittner/homelab_gitops.git
    targetRevision: main
    path: bleu-kalecgos/app/test-nginx
  destination:
    server: https://kubernetes.default.svc
    namespace: gw-test
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true