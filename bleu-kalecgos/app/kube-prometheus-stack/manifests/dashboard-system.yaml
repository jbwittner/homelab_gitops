# bleu-kalecgos/infra/monitoring/dashboard-system.yaml
# Dashboard Grafana « Système — nœuds Talos »
# Chargé automatiquement par le sidecar de kube-prometheus-stack
# via le label grafana_dashboard: "1".
#
# Sources de métriques :
#   - node-exporter        : CPU, mémoire, filesystems, réseau, hwmon
#   - openebs-lvm exporter : VolumeGroups LVM (ServiceMonitor openebs)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-talos-system
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
