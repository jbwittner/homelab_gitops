apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kube-prometheus-stack-grafana
spec:
  # group/kind/weight/sectionName et matches explicites : le CRD les injecte comme
  # défauts côté live — sans eux, OutOfSync permanent dans ArgoCD (cf. argocd-httproute).
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: shared-gw
      namespace: gateway
      sectionName: https-internal-kalecgos
  hostnames:
    - grafana.kalecgos.lan.wittner.tech
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: kube-prometheus-stack-grafana
          port: 80
          weight: 1
