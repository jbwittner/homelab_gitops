apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/part-of: homelab-gitops
    app.kubernetes.io/component: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.19.1
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/bleu-kalecgos/app/kube-prometheus-stack/helm-values.yaml
    - repoURL: https://github.com/jbwittner/homelab_gitops.git
      targetRevision: main
      ref: values
    # Ressources annexes : namespace, SealedSecrets (OIDC + admin), HTTPRoute.
    - repoURL: https://github.com/jbwittner/homelab_gitops.git
      targetRevision: main
      path: bleu-kalecgos/app/kube-prometheus-stack/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      # ServerSideApply OBLIGATOIRE : les CRDs du stack (prometheus-operator) sont trop
      # grosses pour un apply client-side (même contrainte que documentée pour ArgoCD).
      - ServerSideApply=true
