# Values external-dns de neltharion (dossier autonome).
# Pour un autre cluster : copier ce dossier et adapter domainFilters / txtOwnerId /
# --default-targets.

provider:
  name: cloudflare

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

sources:
  - ingress
  - traefik-proxy

domainFilters:
  - wittnerlab.com

# Identifiant du cluster dans les enregistrements TXT de ownership
txtOwnerId: neltharion

# Homelab hostPort (pas de LoadBalancer) : external-dns ne peut pas déduire l'IP du nœud.
# ⚠️ La source `traefik-proxy` N'APPLIQUE PAS --default-targets (contrairement à la source
# `ingress`) : chaque IngressRoute doit donc porter explicitement la cible via l'annotation
# external-dns.alpha.kubernetes.io/target: 5.135.136.115. --default-targets reste ici comme
# filet de sécurité pour d'éventuels Ingress standards (source `ingress`).
# Changement d'IP du nœud = éditer cette ligne ET l'annotation `target` de chaque IngressRoute.
extraArgs:
# - --traefik-disable-legacy
  - --default-targets=5.135.136.115
