apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-provisioner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ssh://git@git-ssh.wittnerlab.com:4222/jbwittner/homelab_gitops.git
    targetRevision: main
    path: neltharion/infra/local-path-provisioner   # dossier Kustomize : base upstream pinnée + patches
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      # Pas de CreateNamespace : le namespace local-path-storage vient du manifest upstream
      # (il est patché pour les labels PSA privileged).
      - ServerSideApply=true
