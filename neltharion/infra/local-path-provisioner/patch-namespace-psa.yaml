# Les helper-pods du provisioner montent un hostPath (création/suppression des dossiers de PV) :
# le namespace doit autoriser les pods privileged (Pod Security Admission).
apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
