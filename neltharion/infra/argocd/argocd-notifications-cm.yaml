# Patch (merge stratégique) du ConfigMap argocd-notifications-cm livré VIDE par l'install upstream.
# Active le service Grafana : à chaque trigger, le notifications-controller fait un POST
# /api/annotations sur Grafana (in-cluster) — les évènements Argo apparaissent ensuite comme
# annotations sur les dashboards.
#
# Le token Grafana est résolu depuis $grafana-apikey (clé du Secret argocd-notifications-secret,
# scellé dans argocd-notifications.sealed-secret.yaml). Tant que ce secret n'existe pas, le
# controller logue une erreur d'envoi mais ne crashe pas.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
data:
  service.grafana: |
    apiUrl: http://monitoring-grafana.monitoring.svc/api
    apiKey: $grafana-apikey

  template.app-deployed: |
    message: "✅ {{.app.metadata.name}} déployé (rev {{.app.status.sync.revision}}) — sain."
  template.app-sync-failed: |
    message: "❌ {{.app.metadata.name}} sync en échec : {{.app.status.operationState.message}}"
  template.app-health-degraded: |
    message: "⚠️ {{.app.metadata.name}} santé dégradée."

  trigger.on-deployed: |
    - description: Application synced and healthy
      when: app.status.operationState != nil and app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      oncePer: app.status.sync.revision
      send: [app-deployed]
  trigger.on-sync-failed: |
    - description: Application sync failed
      when: app.status.operationState != nil and app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]
  trigger.on-health-degraded: |
    - description: Application health degraded
      when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]

  # Subscription PAR DÉFAUT → s'applique à TOUTES les Applications (tag Grafana « argocd »).
  # Pour cibler une seule app à la place, supprimer ce bloc et annoter l'Application voulue :
  #   notifications.argoproj.io/subscribe.on-deployed.grafana: argocd
  subscriptions: |
    - recipients:
        - grafana:argocd
      triggers:
        - on-deployed
        - on-sync-failed
        - on-health-degraded
