apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-ssh-known-hosts-cm
  namespace: argocd
data:
  # Clé(s) d'hôte SSH approuvées par Argo CD pour cloner les repos privés.
  # Le serveur Git auto-hébergé (Forgejo/Gitea, port 4222) n'est PAS dans la liste
  # par défaut d'Argo (qui ne contient que GitHub/GitLab/Bitbucket/Azure) — sans cette
  # entrée, le clone échoue en « host key verification failed ».
  #
  # Récupéré via : ssh-keyscan -p 4222 git-ssh.wittnerlab.com
  # Notation crochets [host]:port obligatoire pour un port non standard.
  ssh_known_hosts: |
    [git-ssh.wittnerlab.com]:4222 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIP7OIuw+z0r40pYoFZVHzSOIx7Kwqezt3OU8t+lUhkwU
    [git-ssh.wittnerlab.com]:4222 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBPnss4PidawxUAYuX6bNkicS2Hnkevi2fhPbgSqbnsRtS825AejT+9p8fu9a+Lks6kQtzOzF/4qBIQKaQdEHAJU=
    [git-ssh.wittnerlab.com]:4222 ssh-rsa 
