apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

# Argo CD du hub neltharion, dossier autonome : install upstream épinglé + patch cmd-params
# + le SPÉCIFIQUE-hub (UI exposée au domaine wittnerlab.com, credentials repo & webhook scellés
# pour CE cluster). Sert AUSSI à l'apply manuel du bootstrap (kubectl apply -k ce dossier).
#
# Note compat K8s 1.36 : le tag de l'install.yaml ci-dessous est le point d'épinglage Argo.
# Si les pods crash-loop après upgrade, bumper le tag vX.Y.Z ici.
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/refs/tags/v3.4.3/manifests/install.yaml
  - argocd-certificate.yaml
  - argocd-ingress-route.yaml
  - argocd-repo.sealed-secret.yaml
  - argocd-webhook.sealed-secret.yaml
  # Notifications Grafana : token scellé pour ce cluster (cf. README « Notifications Grafana »).
  - argocd-notifications.sealed-secret.yaml
patches:
  - path: argocd-cmd-params-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
  - path: argocd-notifications-cm.yaml      # active le service Grafana (notifications)
    target:
      kind: ConfigMap
      name: argocd-notifications-cm
  # Le Secret argocd-notifications-secret est livré VIDE par l'upstream. sealed-secrets refuse
  # d'écraser un Secret qu'il ne possède pas TANT QUE le Secret LIVE ne porte pas cette annotation
  # (le contrôleur la vérifie sur le Secret existant, pas sur le template de la SealedSecret).
  # On l'ajoute donc directement sur le Secret upstream → Argo l'applique → adoption possible.
  - patch: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-notifications-secret
        namespace: argocd
        annotations:
          sealedsecrets.bitnami.com/managed: "true"
    target:
      kind: Secret
      name: argocd-notifications-secret
