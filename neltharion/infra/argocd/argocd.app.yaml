apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"        # avant tout le reste
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:jbwittner/homelab_gitops.git
    targetRevision: main
    path: neltharion/infra/argocd     # MÊME dossier que l'apply manuel du bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  ignoreDifferences:
    # Le Secret argocd-notifications-secret est livré VIDE par l'install upstream puis peuplé
    # hors-bande par sealed-secrets (clé grafana-apikey). On ignore son /data pour éviter un
    # OutOfSync permanent — et surtout un selfHeal qui effacerait le token.
    - group: ""
      kind: Secret
      name: argocd-notifications-secret
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      selfHeal: true
      prune: false                             # ⚠️ prune désactivé — Argo se couperait les jambes
    syncOptions:
      - ServerSideApply=true                   # ⚠️ doit matcher l'apply manuel
      - RespectIgnoreDifferences=true
