apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: neltharion
  namespace: argocd
  labels:
    app.kubernetes.io/name: neltharion
    app.kubernetes.io/part-of: homelab-gitops
    app.kubernetes.io/component: app-of-apps
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # App-of-apps TIER 1 du cluster neltharion, appliqué sur le HUB (kubectl apply de bootstrap).
  # Découvre les deux bootstraps de partie (infra.bootstrap.yaml + apps.bootstrap.yaml) via le
  # glob '*.bootstrap.yaml' ; chacun découvre ensuite ses propres '*.app.yaml'. Les deux
  # suffixes distincts (.bootstrap.yaml ici, .app.yaml en tier 2) évitent toute auto-récursion.
  # Onboarder un cluster = 1 <cluster>/<cluster>.yaml comme celui-ci, appliqué sur le hub.
  source:
    repoURL: ssh://git@git-ssh.wittnerlab.com:4222/jbwittner/homelab_gitops.git
    targetRevision: main
    path: neltharion
    directory:
      recurse: true
      include: '*.bootstrap.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
