---
# EXEMPLE — placeholder plaintext d'un Secret, AVANT scellement par kubeseal.
#
# Dans le repo, ce type de fichier vit à côté de son `*.sealed-secret.yaml` sous le
# dossier du composant, nommé `<secret-name>.secret.yaml` et **gitignored** (motif
# `*.secret.yaml`). Il ne contient JAMAIS de vraie valeur committée : on le remplit
# localement, on scelle, on commit uniquement le `*.sealed-secret.yaml`.
#
# Sceller (méthode privilégiée — directement contre le contrôleur, pas de cert local) :
#   kubeseal --controller-name=sealed-secrets --controller-namespace=sealed-secrets \
#     --format yaml < <name>.secret.yaml > <name>.sealed-secret.yaml
#
# Détails kubeseal (offline, raw, backup de clé) :
#   cf. ../infra/sealed-secrets/README.md
apiVersion: v1
kind: Secret
metadata:
  name: mon-secret-env
  namespace: mon-namespace
type: Opaque
# stringData : valeurs en clair (kubeseal/K8s les encodent en base64).
# Les clés deviennent des variables d'env quand le Secret est monté via `envFrom: secretRef`.
stringData:
  MON_TOKEN: CHANGE_ME
  AUTRE_VALEUR: CHANGE_ME
