apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-forgejo
  namespace: renovate
spec:
  schedule: '0 1 * * *'            # 01h UTC (décalé du run GitHub)
  concurrencyPolicy: Forbid        # jamais deux runs Forgejo en parallèle
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: renovate
              # renovate: datasource=docker depName=renovate/renovate
              image: renovate/renovate:43.222.1
              env:
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_PLATFORM
                  value: forgejo
                - name: RENOVATE_ENDPOINT
                  value: 'https://forgejo.wittnerlab.com/'    # ⚠️ URL de TON instance Forgejo (API à la racine)
                - name: RENOVATE_AUTODISCOVER
                  value: 'false'
                - name: RENOVATE_REPOSITORIES
                  value: 'CHANGE_ME/repo1,CHANGE_ME/repo2'    # ⚠️ repos Forgejo à surveiller
                - name: RENOVATE_GIT_AUTHOR
                  value: 'Renovate Bot <bot@renovateapp.com>'
              envFrom:
                # Secret renovate-forgejo-env (scellé) : porte RENOVATE_TOKEN (token Forgejo).
                - secretRef:
                    name: renovate-forgejo-env
