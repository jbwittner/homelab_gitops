apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:15
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 22
              name: ssh
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: FORGEJO__database__DB_TYPE
              value: postgres
            # Construit host:port depuis le Secret CNPG auto-généré (forgejo-db-app)
            - name: _DB_HOST
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: host
            - name: _DB_PORT
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: port
            - name: FORGEJO__database__HOST
              value: "$(_DB_HOST):$(_DB_PORT)"
            - name: FORGEJO__database__NAME
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: dbname
            - name: FORGEJO__database__USER
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: username
            - name: FORGEJO__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: forgejo-db-app
                  key: password
            - name: FORGEJO__server__ROOT_URL
              value: https://forgejo.wittnerlab.com
            - name: FORGEJO__server__HTTP_PORT
              value: "3000"
            - name: FORGEJO__server__SSH_DOMAIN
              value: forgejo.wittnerlab.com
            - name: FORGEJO__server__SSH_PORT
              value: "2222"
            - name: FORGEJO__security__INSTALL_LOCK
              value: "true"
            - name: FORGEJO__packages__ENABLED
              value: "true"
            - name: FORGEJO__quota__ENABLED
              value: "true"
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
