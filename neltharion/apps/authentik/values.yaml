authentik:
  secret_key: S3Sd8v7Ej6A3j8YHXEbYkkKBs0BsIl
  postgresql:
    host: authentik-db-rw
    name: authentik
server:
  env:
    - name: AUTHENTIK_POSTGRESQL__USER
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: username
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: password
  ingress:
    enabled: true
    annotations:
      external-dns.alpha.kubernetes.io/hostname: grafana.wittnerlab.com
      # IP du nœud : la source traefik-proxy d'external-dns n'applique PAS --default-targets,
      # il faut donc la cible explicitement sur chaque IngressRoute (cf. infra/external-dns).
      external-dns.alpha.kubernetes.io/target: 5.135.136.115
    hosts: 
      - authentik.wittnerlab.com

worker:
  env:
    - name: AUTHENTIK_POSTGRESQL__USER
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: username
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-db-app
          key: password
