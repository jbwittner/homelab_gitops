apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# App whoami autonome : tous les manifests vivent dans ce dossier. Le hostname/domaine
# (whoami.wittnerlab.com) est porté par certificate.yaml + ingress-route.yaml ; un autre
# cluster copierait ce dossier et adapterait ces deux fichiers à son propre domaine.
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - certificate.yaml
  - ingress-route.yaml
