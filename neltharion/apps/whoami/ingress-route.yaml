apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whoami
  namespace: whoami
  annotations:
    external-dns.alpha.kubernetes.io/hostname: whoami.wittnerlab.com
    # IP du nœud : la source traefik-proxy d'external-dns n'applique PAS --default-targets,
    # il faut donc la cible explicitement sur chaque IngressRoute (cf. infra/external-dns).
    external-dns.alpha.kubernetes.io/target: 5.135.136.115
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whoami.wittnerlab.com`)
      kind: Rule
      services:
        - name: whoami
          port: 80
  tls:
    secretName: whoami-tls
