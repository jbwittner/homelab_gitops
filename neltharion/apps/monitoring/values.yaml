prometheus:
  prometheusSpec:
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

grafana:
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  # Exposition via une IngressRoute Traefik + Certificate cert-manager
  # (ingress-route.yaml / certificate.yaml), pas l'Ingress générée par le chart :
  # un Ingress standard reste Progressing dans Argo car Traefik (service ClusterIP)
  # ne publie aucun status.loadBalancer.ingress dessus.
  ingress:
    enabled: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
