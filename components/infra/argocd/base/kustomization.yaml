apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

# Base PARTAGÉE d'Argo CD (agnostique du cluster/hub) : install upstream pinné + patch
# cmd-params. Le SPÉCIFIQUE-hub (Certificate/IngressRoute au domaine, sealed-secrets repo
# & webhook) vit dans l'overlay clusters/<hub>/infra/argocd/.
#
# K8s 1.36 : l'install upstream est pinné via le tag versionné ci-dessous. En cas de
# crash-loop des pods Argo après upgrade, bumper le tag vers le dernier patch v3.4.x.
resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/refs/tags/v3.4.3/manifests/install.yaml

patches:
  - path: argocd-cmd-params-cm.yaml
    target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
