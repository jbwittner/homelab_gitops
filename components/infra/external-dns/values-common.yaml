# Values external-dns PARTAGÉES (agnostiques du cluster).
# Le SPÉCIFIQUE-cluster (domainFilters, txtOwnerId, --default-targets, et donc
# l'ensemble de extraArgs car Helm REMPLACE les listes au lieu de les fusionner)
# vit dans clusters/<cluster>/infra/external-dns/values/values.yaml.

provider:
  name: cloudflare

env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

sources:
  - ingress
  - traefik-proxy
