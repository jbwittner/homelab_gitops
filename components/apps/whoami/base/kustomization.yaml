apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Base PARTAGÉE de l'app whoami (agnostique du cluster).
# Les overlays par cluster (clusters/<cluster>/apps/whoami/) référencent cette base
# et patchent ce qui est spécifique au cluster (hostname/domaine).
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - certificate.yaml
  - ingress-route.yaml
